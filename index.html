<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-NEON: TETHER</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="hud">
            <div class="stat">SCORE: <span id="score">00000</span></div>
            <div class="stat">LIVES: <span id="lives">3</span></div>
            <div class="stat">LEVEL: <span id="level">1</span></div>
        </div>
    </div>
    <div id="dash-container">
        <div id="dash-label">READY</div>
        <div id="dash-bar"><div id="dash-fill"></div></div>
    </div>
    <div id="overlay" class="hidden">
        <h1 id="overlay-title">NEON TETHER</h1>
        <p id="overlay-msg">PRESS [SPACE] TO START</p>
        <p class="controls">[A/D] MOVE | [SPACE] SHOOT | [SHIFT] DASH</p>
    </div>
    <script src="src/game.js"></script>
</body>
</html>
