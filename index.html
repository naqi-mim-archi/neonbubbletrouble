<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMHOUSE DASH</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="hud">
            <div class="stat">SPARKLES: <span id="score">00000</span></div>
            <div class="stat">HEARTS: <span id="lives">3</span></div>
            <div class="stat">STAGE: <span id="level">1</span></div>
        </div>
    </div>
    <div id="dash-container">
        <div id="dash-label">FABULOUS</div>
        <div id="dash-bar"><div id="dash-fill"></div></div>
    </div>
    <div id="overlay">
        <h1 id="overlay-title">DREAMHOUSE DASH</h1>
        <p id="overlay-msg">READY FOR ADVENTURE?</p>
        <p class="controls">[A/D] MOVE | [SPACE] RIBBON TETHER | [SHIFT] SPARKLE DASH</p>
        <p style="font-size: 12px; margin-top: 10px;">PRESS [SPACE] TO BEGIN</p>
    </div>
    <script src="src/game.js"></script>
</body>
</html>
